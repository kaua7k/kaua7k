<svg viewBox="0 0 500 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @font-face {
        font-family: 'Matrix';
        src: url('data:font/truetype;base64,');
      }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- K -->
  <text x="50" y="52" text-anchor="middle"
    font-family="Matrix" font-size="42" fill="#00ff41" filter="url(#glow)">K
    <animate attributeName="opacity"
      values="0;1;1;1;1;1;1;0.4;1;1;0;0"
      keyTimes="0;0.06;0.1;0.4;0.55;0.7;0.78;0.82;0.86;0.9;0.95;1"
      dur="6s" repeatCount="indefinite"/>
  </text>

